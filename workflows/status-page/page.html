<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Status</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      padding: 2rem 1rem;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    header {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      margin-bottom: 2rem;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #111;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: #10b981;
      color: white;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.875rem;
    }
    .status-badge::before {
      content: "";
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .incidents {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .incidents h2 {
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
      color: #111;
    }
    .incident {
      border-left: 4px solid #3b82f6;
      padding: 1rem;
      margin-bottom: 1.5rem;
      background: #f9fafb;
      border-radius: 4px;
    }
    .incident-header {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }
    .severity {
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .severity-Critical {
      background: #fecaca;
      color: #991b1b;
    }
    .severity-Major {
      background: #fed7aa;
      color: #9a3412;
    }
    .severity-Minor {
      background: #fef3c7;
      color: #92400e;
    }
    .severity-Maintenance {
      background: #dbeafe;
      color: #1e3a8a;
    }
    .service {
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      background: #e5e7eb;
      color: #374151;
    }
    .incident h3 {
      font-size: 1rem;
      margin-bottom: 0.5rem;
      color: #111;
    }
    .incident p {
      color: #6b7280;
      line-height: 1.6;
    }
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Service Status</h1>
      <div class="status-badge">All Systems Operational</div>
    </header>

    <div class="incidents">
      <h2>Recent Incidents</h2>
      <!-- sutrena:entries -->
      <div class="empty-state">
        <p>No incidents reported. All systems are running smoothly.</p>
      </div>
    </div>
  </div>
</body>
</html>
