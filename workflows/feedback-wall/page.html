<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What Our Customers Say</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f9fafb;
      padding: 3rem 1rem;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      margin-bottom: 3rem;
    }
    h1 {
      font-size: 2.5rem;
      color: #111;
      margin-bottom: 0.75rem;
    }
    .subtitle {
      font-size: 1.125rem;
      color: #6b7280;
    }
    .testimonials {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 2rem;
    }
    .testimonial {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid #e5e7eb;
      position: relative;
    }
    .testimonial::before {
      content: '"';
      position: absolute;
      top: 1rem;
      left: 1.5rem;
      font-size: 4rem;
      color: #e5e7eb;
      font-family: Georgia, serif;
      line-height: 1;
    }
    .quote {
      color: #374151;
      line-height: 1.8;
      margin-bottom: 1.5rem;
      position: relative;
      z-index: 1;
    }
    .author {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 1.25rem;
    }
    .author-info h3 {
      font-size: 1rem;
      color: #111;
      margin-bottom: 0.125rem;
    }
    .author-info p {
      font-size: 0.875rem;
      color: #6b7280;
    }
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>What Our Customers Say</h1>
      <p class="subtitle">Real feedback from real people</p>
    </header>

    <div class="testimonials">
      <!-- sutrena:entries -->
      <div class="empty-state">
        <p>No testimonials yet. Be the first to share your feedback!</p>
      </div>
    </div>
  </div>
</body>
</html>
