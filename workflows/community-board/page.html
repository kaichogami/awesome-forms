<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Board</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f3f4f6;
      padding: 2rem 1rem;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    header {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      margin-bottom: 2rem;
    }
    h1 {
      font-size: 2rem;
      color: #111;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: #6b7280;
      font-size: 1rem;
    }
    .posts {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .post {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border-left: 4px solid #3b82f6;
    }
    .post-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .category {
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .category-Question {
      background: #dbeafe;
      color: #1e40af;
    }
    .category-Showcase {
      background: #fef3c7;
      color: #92400e;
    }
    .category-Discussion {
      background: #d1fae5;
      color: #065f46;
    }
    .category-Resource {
      background: #e9d5ff;
      color: #6b21a8;
    }
    .category-Event {
      background: #fecaca;
      color: #991b1b;
    }
    .author {
      font-size: 0.875rem;
      color: #6b7280;
    }
    .post h3 {
      font-size: 1.25rem;
      color: #111;
      margin-bottom: 0.75rem;
    }
    .post-content {
      color: #4b5563;
      line-height: 1.7;
      white-space: pre-wrap;
    }
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: #9ca3af;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Community Board</h1>
      <p class="subtitle">Share questions, showcases, discussions, and more</p>
    </header>

    <div class="posts">
      <!-- sutrena:entries -->
      <div class="empty-state">
        <p>No posts yet. Be the first to contribute!</p>
      </div>
    </div>
  </div>
</body>
</html>
